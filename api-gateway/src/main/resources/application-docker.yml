server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:inkasaludSecretKeyForJwtTokenSigningWithHS256AlgorithmMustBeLong2024}

management:
  endpoints:
    web:
      exposure:
        include: "*"
