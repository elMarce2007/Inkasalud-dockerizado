apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: inkasalud
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: inkasalud-system
spec:
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
      protocol: TCP
      name: http
  selector:
    app: api-gateway
