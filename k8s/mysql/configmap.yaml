apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-script
  namespace: inkasalud
  labels:
    app: mysql
    app.kubernetes.io/part-of: inkasalud-system
data:
  init.sql: |
    -- Script de creación de base de datos para Inkasalud Microservices

    -- 1. Auth Service
    CREATE DATABASE IF NOT EXISTS auth_db;
    USE auth_db;

    CREATE TABLE IF NOT EXISTS usuarios (
        id BIGINT AUTO_INCREMENT PRIMARY KEY,
        username VARCHAR(50) NOT NULL UNIQUE,
        password VARCHAR(255) NOT NULL,
        rol VARCHAR(50) NOT NULL
    );

    -- 2. Cliente Service
    CREATE DATABASE IF NOT EXISTS clientes_db;
    USE clientes_db;

    CREATE TABLE IF NOT EXISTS clientes (
        id BIGINT AUTO_INCREMENT PRIMARY KEY,
        nombres VARCHAR(100) NOT NULL,
        apellidos VARCHAR(100) NOT NULL,
        dni VARCHAR(20) UNIQUE,
        telefono VARCHAR(20),
        email VARCHAR(100)
    );

    -- 3. Catalogo Service
    CREATE DATABASE IF NOT EXISTS catalogo_db;
    USE catalogo_db;

    CREATE TABLE IF NOT EXISTS categorias (
        id BIGINT AUTO_INCREMENT PRIMARY KEY,
        nombre VARCHAR(100) NOT NULL,
        descripcion VARCHAR(255)
    );

    CREATE TABLE IF NOT EXISTS productos (
        id BIGINT AUTO_INCREMENT PRIMARY KEY,
        nombre VARCHAR(100) NOT NULL,
        descripcion VARCHAR(255),
        precio DOUBLE NOT NULL,
        stock INT NOT NULL,
        categoria_id BIGINT,
        FOREIGN KEY (categoria_id) REFERENCES categorias(id)
    );

    -- 4. Ventas Service
    CREATE DATABASE IF NOT EXISTS ventas_db;
    USE ventas_db;

    CREATE TABLE IF NOT EXISTS detalle_ventas (
        id BIGINT AUTO_INCREMENT PRIMARY KEY,
        producto_id BIGINT NOT NULL,
        cantidad INT NOT NULL,
        precio_unitario DOUBLE NOT NULL,
        subtotal DOUBLE NOT NULL
    );

    CREATE TABLE IF NOT EXISTS ventas (
        id BIGINT AUTO_INCREMENT PRIMARY KEY,
        fecha DATETIME NOT NULL,
        cliente_id BIGINT NOT NULL,
        total DOUBLE NOT NULL
    );

    CREATE TABLE IF NOT EXISTS ventas_detalles (
        venta_id BIGINT NOT NULL,
        detalles_id BIGINT NOT NULL UNIQUE,
        FOREIGN KEY (venta_id) REFERENCES ventas(id),
        FOREIGN KEY (detalles_id) REFERENCES detalle_ventas(id)
    );

    -- 5. Personal Service
    CREATE DATABASE IF NOT EXISTS personal_db;
    USE personal_db;

    CREATE TABLE IF NOT EXISTS personal (
        id BIGINT AUTO_INCREMENT PRIMARY KEY,
        nombres VARCHAR(100) NOT NULL,
        apellidos VARCHAR(100) NOT NULL,
        cargo VARCHAR(50),
        email VARCHAR(100)
    );
